name: Deploy Kafka topics to prod-gcp
on:
  workflow_dispatch:

permissions:
  contents: "read"
  id-token: "write"

jobs:
  deploy-kafka-topic:
    name: Deploy Kafka topics to prod-gcp
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: "\
            .nais/topics/statistikk-dvh-behandling/topic-prod.yaml,\
            .nais/topics/utbetaling.v1/topic-prod.yaml"
